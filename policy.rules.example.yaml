# UMA BOT declarative policy rules (v1)
#
# Use from config.yaml:
#   policy:
#     rules_file: ~/.umabot/policies/default.yaml
#
# Matching semantics:
# - Rules run by ascending priority (lower first).
# - Empty match fields mean "match all".
# - Pattern fields support fnmatch globs.
# - First matching rule with a concrete effect wins per decision type.

version: v1

rules:
  # 1) Inbound ACL: listener Gmail messages must be processed and surfaced.
  - id: gmail-inbound-always-reviewed
    enabled: true
    priority: 10
    description: Never silently drop inbound Gmail listener messages.
    match:
      connectors: ["gmail*"]
      connector_roles: ["listener"]
      directions: ["inbound"]
    apply:
      ingest_to_llm: true
      set_importance: medium
      set_action: summarize
      set_needs_admin: true
      reason: "Inbound Gmail must be surfaced to admin."

  # 2) Outbound ACL: gmail.search allowed only for explicit admin requests.
  - id: gmail-search-explicit-admin
    enabled: true
    priority: 20
    description: Block implicit gmail.search tool use.
    match:
      tools: ["gmail.search"]
      admin_explicit: false
    apply:
      tool: deny
      reason: "gmail.search requires explicit admin intent."

  # 3) Outbound ACL: shell tools always require confirmation.
  - id: shell-always-confirm
    enabled: true
    priority: 30
    match:
      tools: ["shell.*"]
      directions: ["outbound"]
    apply:
      tool: require_confirmation
      reason: "Shell commands require explicit confirmation."
